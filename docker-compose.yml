services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: covechat
      POSTGRES_USER: covechat
      POSTGRES_PASSWORD: development-only
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covechat -d covechat"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: covechat
      MINIO_ROOT_PASSWORD: development-only-change-me
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
volumes:
  postgres-data:
  minio-data:
