services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${COVECHAT_HTTP_HOST:-127.0.0.1}:${COVECHAT_HTTP_PORT:-8088}:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment:
      COVECHAT_API_HOST: 0.0.0.0
      COVECHAT_API_PORT: 8080
      DATABASE_URL: "postgres://covechat:${POSTGRES_PASSWORD}@postgres:5432/covechat"
      REDIS_URL: "redis://redis:6379/"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: covechat-attachments
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-covechat}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
      AWS_EC2_METADATA_DISABLED: "true"
      RUST_LOG: covechat_api=info
    expose: ["8080"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "/usr/local/bin/covechat-api", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: covechat
      POSTGRES_USER: covechat
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes: [postgres-data:/var/lib/postgresql/data]
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covechat -d covechat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose: ["6379"]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-covechat}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
    volumes: [minio-data:/data]
    expose: ["9000"]

volumes:
  postgres-data:
  minio-data:
