name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: npm ci
      - name: Validate deployment files
        run: |
          bash -n deploy.sh deploy/verify.sh
          POSTGRES_PASSWORD=test-postgres-password \
          MINIO_ROOT_PASSWORD=test-minio-password \
          COVECHAT_SETUP_TOKEN=test-setup-token-at-least-24-characters \
          COVECHAT_ADMIN_TOKEN=test-admin-token-at-least-32-characters \
          COVECHAT_ADMIN_PATH=/manage-ci-test \
          ALLOWED_ORIGINS=https://chat.example.com \
          docker compose -f compose.deploy.yml config --quiet
      - run: npm run build
      - run: npm test --workspaces --if-present
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo check -p covechat-crypto-core --target wasm32-unknown-unknown --features signal-protocol,mls-protocol
